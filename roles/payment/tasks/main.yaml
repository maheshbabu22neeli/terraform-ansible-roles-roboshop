- name: App setup
  ansible.builtin.import_role:
    name: common
    tasks_from: app-setup.yaml

- name: App setup
  ansible.builtin.import_role:
    name: common
    tasks_from: python-setup.yaml

- name: Systemd setup
  ansible.builtin.import_role:
    name: common
    tasks_from: systemd-setup.yaml

- name: Enable and start payment
  ansible.builtin.service:
    name: payment
    state: restarted
    enabled: yes